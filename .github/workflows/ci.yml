# CI/CD — Smart eCommerce Intelligence Pipeline
# Se déclenche à chaque push et pull request sur main/develop
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Lint
        run: |
          pip install ruff
          ruff check scraping data_processing dashboard mcp tests \
               --exclude=venv,__pycache__
          ruff format --check scraping data_processing dashboard mcp tests \
               --exclude=venv,__pycache__