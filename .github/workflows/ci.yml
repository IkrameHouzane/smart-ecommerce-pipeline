# CI/CD — Smart eCommerce Intelligence Pipeline
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov ruff

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Lint
        run: |
          ruff check scraping data_processing dashboard mcp tests \
               --exclude=venv,__pycache__ --ignore=E501
          ruff format --check scraping data_processing dashboard mcp tests \
               --exclude=venv,__pycache__